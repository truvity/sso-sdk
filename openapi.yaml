      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
          description: OK
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
