          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Lock the user centrally (GLOBAL effect)
      tags:
        - support
  /v1/products/{product}/users/{userId}/mfa/reset:
    post:
      description: Removes all second factors; the user re-enrolls at next login. One person has ONE central MFA — this affects every product, not only the caller's.
      operationId: reset-mfa
      parameters:
        - description: Product scope. Must match the caller's credentials.
          in: path
