                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Start a password reset (GLOBAL effect)
      tags:
        - support
  /v1/products/{product}/users/{userId}/sessions:
    delete:
      operationId: terminate-all-sessions
      parameters:
        - description: Product scope. Must match the caller's credentials.
          in: path
          name: product
          required: true
          schema:
            description: Product scope. Must match the caller's credentials.
            examples:
              - acme
            type: string
        - description: The user's central identifier.
          in: path
          name: userId
          required: true
          schema:
            description: The user's central identifier.
            examples:
              - "312909238298"
            type: string
      responses:
        "204":
          description: No Content
        "401":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unauthorized
        "403":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Forbidden
        "404":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Not Found
        "422":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Unprocessable Entity
        "500":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Internal Server Error
        "503":
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Service Unavailable
      summary: Terminate all central sessions of the user
      tags:
