name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/.m2/repository
            typescript/node_modules
          key: sdk-${{ runner.os }}-${{ hashFiles('sso/go.sum', 'java/pom.xml', 'typescript/package.json') }}
          restore-keys: sdk-${{ runner.os }}-

      - name: Install devbox
        run: curl -fsSL https://get.jetify.com/devbox | bash -s -- -f

      - run: devbox run -- ./tools/check.sh
